<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse or publish opportunities on OpportunityMap.">
  <title>Opportunities — OpportunityMap</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/opportunities.css">
  <link rel="stylesheet" href="../css/map.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <header class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand"><i class="fa-solid fa-map-location-dot"></i> Opportunity<span>Map</span></a>
      <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="opportunities.html" aria-current="page">Opportunities</a></li>
        <li><a href="favorites.html" class="auth-only hidden">Favorites</a></li>
        <li><a href="notifications.html" class="auth-only hidden">Notifications</a></li>
        <li><a href="dashboard.html" class="auth-only hidden">Dashboard</a></li>
        <li><a href="profile.html" class="auth-only hidden">Profile</a></li>
        <li><a href="login.html" class="guest-only">Login</a></li>
        <li><a href="register.html" class="guest-only">Sign up</a></li>
        <li><button type="button" id="logout-btn" class="auth-only hidden btn-link">Logout</button></li>
      </ul>
    </div>
  </header>

  <main class="container">

    <div class="page-header-flex">
      <h1>Opportunities</h1>
      <div class="opportunities-actions">
        <button type="button" class="tab-btn active" data-tab="browse">Browse</button>
        <button type="button" class="tab-btn auth-only hidden" data-tab="publish">Publish an opportunity</button>
      </div>
    </div>

    <!-- ===== BROWSE TAB ===== -->
    <section id="tab-browse" class="tab-panel">

      <!-- Sub-view: list -->
      <div id="browse-list">

        <div class="form-filters">
          <select id="filter-type">
            <option value="">All types</option>
            <option value="internship">Internships</option>
            <option value="competition">Competitions</option>
            <option value="training">Training</option>
            <option value="event">Events</option>
          </select>

          <select id="filter-field">
            <option value="">All fields</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Marketing">Marketing</option>
            <option value="Entrepreneurship">Entrepreneurship</option>
            <option value="Agriculture">Agriculture</option>
            <option value="Engineering">Engineering</option>
            <option value="Education">Education</option>
          </select>

          <input type="text" id="filter-city" placeholder="Enter a city...">
        </div>

        <div id="opportunities-list" class="card-grid" aria-live="polite">
          <p class="empty-state">Loading opportunities…</p>
        </div>
      </div>

      <!-- Sub-view: detail (hidden until an opportunity is selected) -->
      <div id="browse-detail" class="hidden">
        <button type="button" id="back-to-list-btn" class="btn btn-secondary mb-24">← Back to list</button>
        <div id="opportunity-detail"></div>
      </div>

    </section>

    <!-- ===== PUBLISH TAB ===== -->
    <section id="tab-publish" class="tab-panel hidden">
      <div class="form">
        <h2>Publish an opportunity</h2>
        <form id="add-opportunity-form">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required>
          </div>

          <div class="form-group">
            <label for="type">Type</label>
            <select id="type" required>
              <option value="internship">Internship</option>
              <option value="competition">Competition</option>
              <option value="training">Training</option>
              <option value="event">Event</option>
            </select>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description"></textarea>
          </div>

          <div class="form-group">
            <label for="field">Field</label>
            <input type="text" id="field" placeholder="Ex: IT">
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Ex: Ouagadougou">
          </div>

          <div class="form-group">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline">
          </div>

          <div class="form-group">
            <label for="link">External link</label>
            <input type="url" id="link" placeholder="https://...">
          </div>

          <button type="submit" class="btn btn-primary">Publish</button>
          <p id="form-error" class="form-error"></p>
        </form>
      </div>
    </section>

  </main>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/map.js"></script>
  <script src="../js/opportunity-detail.js"></script>
  <script src="../js/opportunities.js"></script>
</body>
</html>
